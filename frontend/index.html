<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Gym Recorder</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: #a0c4ff;
      text-align: center;
    }
    p.subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
      text-align: center;
    }
    #preview {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      display: none;
      margin-bottom: 16px;
      border: 2px solid #2a2a4a;
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 400px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { opacity: 0.75; transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #cameraBtn  { background: #4361ee; color: #fff; }
    #galleryBtn { background: #2d6a4f; color: #fff; }
    #uploadBtn  { background: #7b2d8b; color: #fff; display: none; }
    #status {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 10px;
      max-width: 400px;
      width: 100%;
      font-size: 0.95rem;
      line-height: 1.5;
      display: none;
      word-break: break-word;
    }
    .success { background: #0d2b1e; color: #74c69d; border: 1px solid #1a5c3a; }
    .error   { background: #2b0d0d; color: #ff8080; border: 1px solid #5c1a1a; }
    .loading { background: #0d1b2b; color: #90caf9; border: 1px solid #1a3a5c; }
    .sheet-link {
      display: inline-block;
      margin-top: 8px;
      color: #90caf9;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Gym Recorder</h1>
  <p class="subtitle">Photograph a notebook page to save your workout</p>

  <img id="preview" alt="Selected notebook page">

  <button class="btn" id="cameraBtn">📷 Take Photo</button>
  <button class="btn" id="galleryBtn">🖼 Choose from Library</button>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="galleryInput" accept="image/*" style="display:none">

  <button class="btn" id="uploadBtn">Upload &amp; Parse</button>

  <div id="status"></div>

  <script>
    const cameraBtn   = document.getElementById('cameraBtn');
    const galleryBtn  = document.getElementById('galleryBtn');
    const cameraInput = document.getElementById('cameraInput');
    const galleryInput= document.getElementById('galleryInput');
    const uploadBtn   = document.getElementById('uploadBtn');
    const preview     = document.getElementById('preview');
    const statusEl    = document.getElementById('status');
    let selectedFile  = null;

    cameraBtn.addEventListener('click', () => cameraInput.click());
    galleryBtn.addEventListener('click', () => galleryInput.click());

    function onFileSelected(e) {
      selectedFile = e.target.files[0];
      if (!selectedFile) return;
      preview.src = URL.createObjectURL(selectedFile);
      preview.style.display = 'block';
      uploadBtn.style.display = 'block';
      hideStatus();
    }
    cameraInput.addEventListener('change', onFileSelected);
    galleryInput.addEventListener('change', onFileSelected);

    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      showStatus('Uploading and parsing your workout...', 'loading');
      uploadBtn.disabled = true;
      cameraBtn.disabled = true;
      galleryBtn.disabled = true;

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Upload failed');

        showStatus(
          `Saved! <strong>${escapeHtml(data.workout_name)}</strong> on ${escapeHtml(data.date)}<br>` +
          `${data.exercises_parsed} exercise(s), ${data.cardio_parsed} cardio item(s) parsed.<br>` +
          `<a class="sheet-link" href="${escapeHtml(data.sheet_url)}" target="_blank" rel="noopener">View in Google Sheets →</a>`,
          'success'
        );
        uploadBtn.style.display = 'none';
        preview.style.display = 'none';
        selectedFile = null;
        cameraInput.value = '';
        galleryInput.value = '';
      } catch (err) {
        showStatus(`Error: ${escapeHtml(err.message)}`, 'error');
      } finally {
        uploadBtn.disabled = false;
        cameraBtn.disabled = false;
        galleryBtn.disabled = false;
      }
    });

    function showStatus(html, type) {
      statusEl.innerHTML = html;
      statusEl.className = type;
      statusEl.style.display = 'block';
    }

    function hideStatus() {
      statusEl.style.display = 'none';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
